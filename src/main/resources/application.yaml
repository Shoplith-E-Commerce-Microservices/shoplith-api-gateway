spring:
  application:
    name: api-gateway
  webflux:
    throw-exception-if-no-handler-found: true
  cloud:
    gateway:
      server:
        webflux:
          routes:

            # =========================
            # AUTH SERVICE
            # =========================
            - id: auth-service
              uri: lb://AUTH
              predicates:
                - Path=/api/v1/auth/**

            # =========================
            # CUSTOMER SERVICE
            # =========================
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/api/v1/customer/**

            # =========================
            # CART SERVICE
            # =========================
            - id: cart-service
              uri: lb://CART-SERVICE
              predicates:
                - Path=/api/v1/cart/**
      globalcors:
        add-to-simple-url-handler-mapping: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:5001/eureka

server:
  port: 8765

management:
  endpoints:
    web:
      exposure:
        include: '*'

  info:
    env:
      enabled: true

